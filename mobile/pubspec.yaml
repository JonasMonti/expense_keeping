name: despesas
description: "Gestão de despesas pessoais — app nativa (Flutter)."
publish_to: 'none'
version: 1.2.0+4

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3          # SQLite local no dispositivo (offline)
  path: ^1.9.0
  intl: ^0.20.2            # formatação pt-PT de datas/números (alinhado com flutter_localizations)
  fl_chart: ^0.69.0        # gráficos (donut + linha)
  app_links: ^7.2.0       # deep links (Siri/Google → despesas://add)
  speech_to_text: ^7.4.0  # reconhecimento de voz (botão 🎤)
  image_picker: ^1.1.2    # tirar foto / escolher imagem da fatura
  google_mlkit_text_recognition: ^0.15.0  # OCR no dispositivo (offline, ler faturas)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.3   # BD em memória para testes do repositório

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Space Grotesk
      fonts:
        # Fonte variável (eixo wght 300–700); o Flutter aplica o peso pedido.
        - asset: assets/fonts/SpaceGrotesk.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
